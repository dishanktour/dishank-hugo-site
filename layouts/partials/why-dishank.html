<section id="why" class="why-section">

  <!-- Background -->
  <div class="why-bg">
    {{ $img := resources.Get "images/why-bg.webp" }}
    {{ $resized := $img.Resize "1200x" }}

    <img 
      src="{{ $resized.RelPermalink }}" 
      width="{{ $resized.Width }}" 
      height="{{ $resized.Height }}" 
      loading="lazy" 
      alt="why-bg">
  </div>

  <!-- Content -->
  <div class="container why-content">
    <h2>{{ i18n "why_title" }}</h2>

    <p>{{ i18n "why_para1" }}</p>
    <p>{{ i18n "why_para2" }}</p>
    <p>{{ i18n "why_para3" }}</p>
  </div>

  <!-- CTA -->
  <a href="#talk" class="cta-glass why-cta-position">
    {{ i18n "why_cta" }}
  </a>

</section>
