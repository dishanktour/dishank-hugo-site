<section id="unveiled" class="section pad-sm">

  <div class="container">
        
        <div class="unveiled-wrapper">

          <!-- LEFT 40% IMAGE -->
          <div class="unveiled-image">
            {{ $img := resources.Get "images/Unveiled.webp" }}
            {{ $resized := $img.Resize "900x" }}

            <img 
              src="{{ $resized.RelPermalink }}" 
              width="{{ $resized.Width }}" 
              height="{{ $resized.Height }}" 
              loading="lazy" 
              alt="Unveiled">
          </div>

          <!-- RIGHT 60% CONTENT -->
          <div class="unveiled-content">
            <h2>{{ i18n "unveiled_title" }}</h2>

            <p>
              {{ i18n "unveiled_para1" }}
            </p>

            <p>
              {{ i18n "unveiled_para2" }}
            </p>

            <p>
              {{ i18n "unveiled_para3" }}
            </p>

          </div>

        </div>
  </div>

  <!-- FLOATING RIBBON CTA -->
  <a href="#talk" class="cta-glass unveiled-cta-position">
    {{ i18n "unveiled_cta" }}
  </a>

</section>
